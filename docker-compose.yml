services:
  web:
    build: .
    container_name: latido_andino_web
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=latido_andino
    networks:
      - latido_network

  mongodb:
    image: mongo:7.0
    container_name: latido_andino_db
    ports:
      - "27017:27017"
    volumes:
      - latido_data:/data/db
    networks:
      - latido_network

volumes:
  latido_data:

networks:
  latido_network:
    driver: bridge